<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 140" width="500" height="140">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E040FB"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#F0E6FF"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>

    <linearGradient id="studioGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>

    <linearGradient id="underlineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E040FB"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>

    <filter id="nodeGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="lineGlow" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="500" height="140" fill="none"/>

  <!-- ===== AI NEURAL NETWORK ICON ===== -->
  <g transform="translate(14, 10)">

    <g filter="url(#lineGlow)" opacity="0.6">
      <line x1="18" y1="30" x2="58" y2="20" stroke="url(#mainGrad)" stroke-width="1.2"/>
      <line x1="18" y1="60" x2="58" y2="20" stroke="url(#mainGrad)" stroke-width="1.2"/>
      <line x1="18" y1="60" x2="58" y2="60" stroke="url(#mainGrad)" stroke-width="1.2"/>
      <line x1="18" y1="90" x2="58" y2="60" stroke="url(#mainGrad)" stroke-width="1.2"/>
      <line x1="18" y1="90" x2="58" y2="100" stroke="url(#mainGrad)" stroke-width="1.2"/>
      <line x1="18" y1="60" x2="58" y2="100" stroke="url(#mainGrad)" stroke-width="1.2"/>
      <line x1="58" y1="20" x2="98" y2="30" stroke="url(#mainGrad)" stroke-width="1.2"/>
      <line x1="58" y1="20" x2="98" y2="60" stroke="url(#mainGrad)" stroke-width="1.2"/>
      <line x1="58" y1="60" x2="98" y2="30" stroke="url(#mainGrad)" stroke-width="1.2"/>
      <line x1="58" y1="60" x2="98" y2="60" stroke="url(#mainGrad)" stroke-width="1.2"/>
      <line x1="58" y1="60" x2="98" y2="90" stroke="url(#mainGrad)" stroke-width="1.2"/>
      <line x1="58" y1="100" x2="98" y2="60" stroke="url(#mainGrad)" stroke-width="1.2"/>
      <line x1="58" y1="100" x2="98" y2="90" stroke="url(#mainGrad)" stroke-width="1.2"/>
    </g>

    <g filter="url(#nodeGlow)">
      <circle cx="18" cy="30" r="5.5" fill="#E040FB"/>
      <circle cx="18" cy="60" r="5.5" fill="#A855F7"/>
      <circle cx="18" cy="90" r="5.5" fill="#7C3AED"/>
    </g>

    <g filter="url(#nodeGlow)">
      <circle cx="58" cy="20" r="5" fill="#E040FB"/>
      <circle cx="58" cy="60" r="6.5" fill="#9333EA"/>
      <circle cx="58" cy="100" r="5" fill="#6366F1"/>
    </g>

    <g filter="url(#nodeGlow)">
      <circle cx="98" cy="30" r="5.5" fill="#A855F7"/>
      <circle cx="98" cy="60" r="5.5" fill="#7C3AED"/>
      <circle cx="98" cy="90" r="5.5" fill="#3B82F6"/>
    </g>

    <circle cx="58" cy="60" r="11" fill="none" stroke="#9333EA" stroke-width="1" opacity="0.4"/>
    <circle cx="58" cy="60" r="16" fill="none" stroke="#7C3AED" stroke-width="0.8" opacity="0.2"/>

  </g>

  <!-- Vertical divider -->
  <line x1="138" y1="22" x2="138" y2="118" stroke="#2D1B4E" stroke-width="1"/>

  <!-- ===== WORDMARK ===== -->
  <g transform="translate(158, 0)">

    <text x="0" y="80"
      font-family="'Arial Black', 'Helvetica Neue', sans-serif"
      font-size="56"
      font-weight="900"
      letter-spacing="2"
      fill="url(#textGrad)">DRIFT</text>

    <rect x="1" y="87" width="280" height="1.5" rx="1" fill="url(#underlineGrad)"/>

    <text x="3" y="111"
      font-family="'Arial', 'Helvetica Neue', sans-serif"
      font-size="13"
      font-weight="300"
      letter-spacing="14"
      fill="url(#studioGrad)">STUDIO</text>

  </g>

</svg>
